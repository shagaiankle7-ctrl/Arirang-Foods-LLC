<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ариранг Фүүдс — Коучинг оношилгоо</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4ff;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem;color:#111827}
.wrap{width:100%;max-width:560px}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:2rem}
.logo{width:52px;height:52px;background:#dc2626;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;box-shadow:0 4px 12px rgba(220,38,38,.3)}
.brand h1{font-size:18px;font-weight:600}
.brand p{font-size:13px;color:#4b5563;margin-top:2px}
.prog-wrap{margin-bottom:1.5rem}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-lbl{font-size:13px;color:#4b5563}
.xp{background:#dcfce7;color:#16a34a;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.prog-track{width:100%;height:6px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#f87171,#dc2626);border-radius:99px;transition:width .5s ease;width:0%}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);padding:1.75rem;animation:up .3s ease}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sec-badge{display:inline-block;background:#fee2e2;color:#dc2626;font-size:11px;font-weight:600;letter-spacing:.5px;padding:4px 12px;border-radius:20px;margin-bottom:1rem;text-transform:uppercase}
.q-text{font-size:16px;font-weight:500;line-height:1.55;margin-bottom:1.25rem}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:8px;padding:11px 16px;font-size:14px;color:#1f2937;cursor:pointer;text-align:left;transition:all .15s;width:100%;font-family:'Plus Jakarta Sans',sans-serif}
.opt:hover{background:#fee2e2;border-color:#f87171;color:#dc2626}
.opt.sel{background:#fee2e2;border-color:#dc2626;color:#dc2626;font-weight:500}
.lk-row{display:flex;gap:8px}
.lk{flex:1;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:8px;padding:10px 4px;font-size:15px;font-weight:600;color:#374151;cursor:pointer;text-align:center;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.lk:hover{background:#fee2e2;border-color:#f87171;color:#dc2626}
.lk.sel{background:#dc2626;border-color:#dc2626;color:#fff}
.lk-lbl{display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;margin-top:6px}
.scale-row{display:flex;gap:6px;flex-wrap:wrap}
.sc{flex:1;min-width:36px;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:8px;padding:9px 2px;font-size:13px;font-weight:600;color:#374151;cursor:pointer;text-align:center;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.sc:hover{background:#fee2e2;border-color:#f87171;color:#dc2626}
.sc.sel{background:#dc2626;border-color:#dc2626;color:#fff}
textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:12px 14px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#111827;background:#f9fafb;outline:none;transition:border .15s;min-height:90px;resize:vertical}
textarea:focus{border-color:#dc2626;background:#fff}
.acts{margin-top:1.25rem;display:flex;align-items:center;gap:10px}
.btn-go{background:#dc2626;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(220,38,38,.25);font-family:'Plus Jakarta Sans',sans-serif}
.btn-go:disabled{background:#e5e7eb;color:#9ca3af;box-shadow:none;cursor:not-allowed}
.btn-go:not(:disabled):hover{background:#b91c1c;transform:translateY(-1px)}
.toast{position:fixed;bottom:28px;right:24px;background:#111827;color:#fff;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
.done-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);padding:2.5rem 1.75rem;text-align:center}
.done-card h2{font-size:22px;font-weight:600;margin-bottom:0.75rem}
.done-card p{font-size:15px;color:#4b5563;line-height:1.6}
@media(max-width:480px){body{padding:1rem .75rem 3rem}.card{padding:1.25rem}.lk-row{gap:5px}.scale-row{gap:4px}}
</style>
</head>

  {q:"Багийн тэмцээнд оролцох",o:["Тайван зөвлөх","Уурлах","Айж сууна","Дүргүйцэх"]},
  {q:"Бусдын санаанд итгэх",o:["Сонсож хүлээж авах","Шууд эсэргүүцэх","Айх","Дүргүйцэх"]},
  {q:"Ажилтны сэтгэл санааг дэмжих",o:["Тайван зөвлөх","Дүргүйцэх","Бусдад хэлэх","Өөртөө санаа зовох"]}

EQ_Q.forEach(function(q,i){
  Q.push({id:"EQ"+(i+1),sec:"EQ",sl:i===0?"Мэргэжлийн EQ — Барроны аргачлал (25 асуулт)":"",q:q.q,t:"single",o:q.o,xp:2});
});

// Нэмэлт - 10 нээлттэй
var NEM = ["Таны мөрөөдөл","Таны зорилго","Баримталдаг зарчим","Бахархдаг зүйлс","Зан чанарын сайн талууд","Зан чанарын сул талууд","Хийх дуртай ажлууд","Хийх дургүй ажлууд","Хамгийн сайн хийж чаддаг ажил (Бусдаас илүү хийж чадна гэж итгэлтэй байдаг ажил)","Ажил үйл хэргийн алдаа, онооноос ойлгож мэдсэн сургамж"];
NEM.forEach(function(q,i){
  Q.push({id:"NEM"+(i+1),sec:"NEM",sl:i===0?"Нэмэлт асуулга (10 асуулт)":"",q:q,t:"open",xp:3});
});

// ============ ХӨДӨЛГҮҮР ============
var cur=-1, ans={}, xp=0;
var tmsgs=["✓ Бүртгэгдлээ","✓ Дараагийн","✓ Үргэлжилж байна","✓ Тэмдэглэлээ"];

function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},1500);}

function updProg(){
  var pct=cur<0?0:Math.round((cur/Q.length)*100);
  document.getElementById("pbar").style.width=pct+"%";
  document.getElementById("plbl").textContent=cur<0?"Эхлэл":(cur+" / "+Q.length);
  document.getElementById("xplbl").textContent=pct+"%";
}

function showWelcome(){
  document.getElementById("body").innerHTML=
    '<div class="card" style="padding:2rem 1.75rem">'+
    '<p style="font-size:15px;color:#374151;line-height:1.8;margin-bottom:1.5rem">Эрхэм <strong>Ариранг Фүүдс ХХК</strong>-н ажилтан танд энэ өдрийн мэнд хүргэе.</p>'+
    '<p style="font-size:14px;color:#4b5563;line-height:1.8;margin-bottom:1rem">Та энэхүү сорилыг <strong>үнэн зөв</strong>, толгойд орсон <strong>хамгийн эхний таамгаар</strong> бөглөнө үү.</p>'+
    '<p style="font-size:14px;color:#4b5563;line-height:1.8;margin-bottom:1.5rem">Танаас цаг хугацаа нэлээн шаардах тул та <strong>нухацтай тайван байх үедээ</strong> бөглөөд явуулна уу. Та үүнийг бөглөсний хариуд <strong>гайхалтай үр дүнгүүдийг</strong> сонсох болно.</p>'+
    '<p style="font-size:16px;font-weight:600;color:#111827;margin-bottom:1.25rem;text-align:center">Та бөглөхөд бэлэн үү?</p>'+
    '<div style="text-align:center"><button onclick="startSurvey()" style="background:#dc2626;color:#fff;border:none;border-radius:8px;padding:14px 48px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(220,38,38,.3)">Бэлэн ✓</button></div>'+
    '</div>';
  updProg();
}

function startSurvey(){cur=0;render();}

function render(){
  if(cur>=Q.length){showDone();return;}
  var q=Q[cur];
  var h="";
  if(q.sl) h+='<div class="sec-badge">'+q.sl+'</div>';
  h+='<div class="card"><div class="q-text">'+q.q+'</div>';

  if(q.t==="iq"||q.t==="single"){
    h+='<div class="opts">';
    for(var i=0;i<q.o.length;i++) h+='<button class="opt" data-val="'+q.o[i]+'" onclick="pickS(this)">'+q.o[i]+'</button>';
    h+='</div><div class="acts"><button class="btn-go" id="nb" disabled onclick="nextQ()">Үргэлжлүүлэх →</button></div>';
  } else if(q.t==="scale04"){
    h+='<div class="lk-lbl" style="margin-bottom:6px"><span>0 — Огт үгүй</span><span>4 — Маш байнга</span></div>';
    h+='<div class="scale-row">';
    for(var n=0;n<=4;n++) h+='<button class="sc" data-val="'+n+'" onclick="pickSC(this)">'+n+'</button>';
    h+='</div>';
    h+='<div class="acts"><button class="btn-go" id="nb" disabled onclick="nextQ()">Үргэлжлүүлэх →</button></div>';
  } else if(q.t==="scale14"){
    h+='<div class="lk-lbl" style="margin-bottom:6px"><span>1 — Маш их санал нийлнэ</span><span>4 — Огт санал нийлэхгүй</span></div>';
    h+='<div class="scale-row">';
    for(var n=1;n<=4;n++) h+='<button class="sc" data-val="'+n+'" onclick="pickSC(this)">'+n+'</button>';
    h+='</div>';
    h+='<div class="acts"><button class="btn-go" id="nb" disabled onclick="nextQ()">Үргэлжлүүлэх →</button></div>';
  } else if(q.t==="scale03"){
    h+='<div class="lk-lbl" style="margin-bottom:6px"><span>0 — Огт үгүй</span><span>3 — Бараг өдөр бүр</span></div>';
    h+='<div class="scale-row">';
    for(var n=0;n<=3;n++) h+='<button class="sc" data-val="'+n+'" onclick="pickSC(this)">'+n+'</button>';
    h+='</div>';
    h+='<div class="acts"><button class="btn-go" id="nb" disabled onclick="nextQ()">Үргэлжлүүлэх →</button></div>';
  } else if(q.t==="scale15"){
    h+='<div class="lk-lbl" style="margin-bottom:6px"><span>1 — Огт санал нийлэхгүй</span><span>5 — Бүрэн санал нийлнэ</span></div>';
    h+='<div class="scale-row">';
    for(var n=1;n<=5;n++) h+='<button class="sc" data-val="'+n+'" onclick="pickSC(this)">'+n+'</button>';
    h+='</div>';
    h+='<div class="acts"><button class="btn-go" id="nb" disabled onclick="nextQ()">Үргэлжлүүлэх →</button></div>';
  } else if(q.t==="open"){
    h+='<textarea id="oi" placeholder="Энд бичнэ үү..."></textarea>';
    h+='<div class="acts"><button class="btn-go" id="nb" onclick="nextQ()">Үргэлжлүүлэх →</button></div>';
  }
  h+='</div>';
  document.getElementById("body").innerHTML=h;
  updProg();
  window.scrollTo(0,0);
}

function pickS(el){var btns=document.querySelectorAll(".opt");for(var i=0;i<btns.length;i++) btns[i].classList.remove("sel");el.classList.add("sel");ans[Q[cur].id]=el.getAttribute("data-val");document.getElementById("nb").disabled=false;}
function pickSC(el){var btns=document.querySelectorAll(".sc");for(var i=0;i<btns.length;i++) btns[i].classList.remove("sel");el.classList.add("sel");ans[Q[cur].id]=parseInt(el.getAttribute("data-val"));document.getElementById("nb").disabled=false;}

function nextQ(){
  var q=Q[cur];
  if(q.t==="open"){var el=document.getElementById("oi");if(el) ans[q.id]=el.value.trim();}
  xp+=q.xp;
  toast(tmsgs[Math.floor(Math.random()*tmsgs.length)]);
  cur++;
  if(cur>=Q.length){showDone();return;}
  render();
}

function showDone(){
  document.getElementById("pbar").style.width="100%";
  document.getElementById("plbl").textContent="Дууслаа!";
  document.getElementById("xplbl").textContent="100%";
  document.getElementById("body").innerHTML=
    '<div class="done-card">'+
    '<div style="font-size:52px;margin-bottom:1rem">🎉</div>'+
    '<h2>Танд баяр хүргэе!</h2>'+
    '<p style="margin-top:0.75rem">Та оношилгоог амжилттай дуусгалаа.<br>Таны хариулт бүртгэгдлээ.</p>'+
    '</div>';
  submitData(ans);
  setTimeout(showConfetti, 500);
}

function showConfetti(){
  var canvas=document.createElement("canvas");
  canvas.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999";
  document.body.appendChild(canvas);
  var ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  var pieces=[];
  var colors=["#dc2626","#f59e0b","#16a34a","#1a56db","#7c3aed","#ec4899","#fff"];
  for(var i=0;i<200;i++){
    pieces.push({x:Math.random()*canvas.width,y:-10-Math.random()*canvas.height*0.5,w:6+Math.random()*8,h:4+Math.random()*6,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,vx:(Math.random()-0.5)*3,vy:2+Math.random()*3,vr:(Math.random()-0.5)*8});
  }
  var frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(function(p){ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.globalAlpha=0.85;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;});
    frame++;
    if(frame<200) requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.remove();}
  }
  draw();
}

function submitData(data){
  fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}).catch(function(e){console.log(e);});
}

showWelcome();
</script>
